<!DOCTYPE html>
<html lang="pt"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/LayoutPadrao}">

<section layout:fragment="conteudo">

    <div class="container-fluid mt-4">

        <h1>Estilos</h1>

        <!-- Mensagem de sucesso -->
        <div th:if="${mensagem}" class="alert alert-success"
             th:text="${mensagem}"></div>

        <!-- ============================= -->
        <!-- FILTRO -->
        <!-- ============================= -->
        <form method="get" class="row g-3 mb-3">

            <div class="col-md-4">
                <input type="text"
                       name="nome"
                       class="form-control"
                       placeholder="Nome do estilo"
                       th:value="${nome}">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary w-100">
                    Filtrar
                </button>
            </div>

        </form>

        <!-- ============================= -->
        <!-- TABELA -->
        <!-- ============================= -->
        <table class="table table-striped table-hover">

            <thead class="table-dark">
            <tr>
                <th>Nome</th>
                <th class="text-center">Ações</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="estilo : ${estilos}">
                <td th:text="${estilo.nome}"></td>

                <td class="text-center">

                    <!-- BOTÃO NÃO ENVIA FORM -->
                    <button type="button"
                            class="btn btn-sm btn-outline-danger btn-excluir"
                            th:attr="data-id=${estilo.id}, data-nome=${estilo.nome}, data-url=@{/estilos}">
                        <i class="fa fa-trash"></i> Excluir
                    </button>

                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(estilos)}">
                <td colspan="2" class="text-center text-muted">
                    Nenhum estilo encontrado.
                </td>
            </tr>

            </tbody>

        </table>

    </div>


    <!-- ================================= -->
    <!-- MODAL DE EXCLUSÃO -->
    <!-- ================================= -->
    
<div th:replace="modal-excluir :: modalExcluir"></div>

    <!-- SCRIPT DO MODAL -->
    <script th:src="@{/js/listar-estilos.js}"></script>
    <!-- delete-entity.js -->
    <script th:src="@{/js/delete-entity.js}"></script>

</section>
</html>
