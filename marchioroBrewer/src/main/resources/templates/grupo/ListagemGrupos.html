<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}">

<body>
	<div th:if="${mensagemSucesso}"
		class="alert alert-success alert-dismissible fade show">

		<span th:text="${mensagemSucesso}"></span>

		<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
	</div>
	<!-- =========================================================
     CONTEÚDO PRINCIPAL
========================================================== -->
	<section layout:fragment="conteudo">

		<div class="container-fluid mt-4">

			<!-- =================================================
             TÍTULO
        ================================================== -->
			<h1 class="mb-4">Listagem de Grupos</h1>
		</div>
		
		<!-- =================================================
             TABELA DE USUÁRIOS
        ================================================== -->
		<div class="table-reponsive">
			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr class="text-center">
						<th>Nome do Grupo</th>
						<th>Permisses</th>
						<th>Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr class="text-center" th:each="g : ${grupos}">
						<td th:text="${g.nomeGrupo}"></td>
						<td></td>
						<td>
							<!-- ======================================
                             EDITAR
                        ======================================= --> <a
							th:href="@{/grupo/{id}(id=${g.id})}"
							class="btn btn-sm btn-outline-primary"> <i class="fa fa-edit"></i>
								Editar
						</a> <!-- ======================================
                             SOFT DELETE
                        ======================================= --> <!-- EXCLUIR (MODAL) -->
							<button type="button" class="btn btn-sm btn-outline-danger"
								data-bs-toggle="modal" data-bs-target="#modalExcluir"
								th:attr="data-id=${g.id}, data-nome=${g.nomeGrupo}">

								<i class="fa fa-trash"></i> <span class="d-none d-md-inline">
									Excluir</span>

							</button>
						</td>
						</tr>
				</tbody>
				</table>
				</div>
		
	</section>
	</body>
	</html>
