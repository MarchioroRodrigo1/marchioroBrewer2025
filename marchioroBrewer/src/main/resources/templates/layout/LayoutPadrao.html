<!DOCTYPE html>
<html lang="pt"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}" />
<meta name="_csrf_header" th:content="${_csrf.headerName}" />
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Sistema</title>

    <!-- ================================
         CSS (BOA PRÁTICA: sempre no head)
    ================================== -->
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}" />
</head>

<body class="bg-body">

<div class="d-flex">

    <!-- SIDEBAR -->
    <div th:replace="~{layout/fragments/sidebar :: layout-sidebar}"></div>

    <div class="w-100">

        <!-- NAVBAR -->
        <div th:replace="~{layout/fragments/navbar :: layout-navbar}"></div>

        <!-- CONTEÚDO -->
        <main class="p-4">
            <section layout:fragment="conteudo"></section>
        </main>
        
        <div th:replace="~{layout/fragments/mensagens :: mensagens}"></div>

        <!-- FOOTER -->
        <div class="text-center" th:replace="~{layout/fragments/footer :: layout-footer}"></div>

    </div>
</div>

<!-- ====================================
     JAVASCRIPT (BOA PRÁTICA: antes do </body>)
   ==================================== -->

<!-- Bootstrap -->
<script th:src="@{/js/bootstrap.bundle.min.js}"></script>

<!-- Remove o estado de erro quando o usuário interagir -->
<!--  <script th:src="@{/js/validacao-form.js}"></script> -->

<!-- Tema claro/escuro -->
<script th:src="@{/js/theme.js}"></script>

<!-- Formatadores de campos -->
<script th:src="@{/js/formatters.js}"></script>

<!-- sidebar js -->
<script th:src="@{/js/sidebar.js}"></script>
<!-- Soft Delete -->
<!--<script th:src="@{/js/cervejas.js}"></script>-->

<!-- REMOVER -->
<!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script> -->

<!-- Carrega estado -->
<script th:src="@{/js/carrega-estados.js}"></script>

<script th:src="@{/js/carrega-cidades.js}"></script>

<script th:src="@{/js/mascaras.js}"></script>
<script th:src="@{/js/mascara-cadastro-cliente.js}"></script>
<!-- Carrega password strength -->
<script th:src="@{/js/password-strength.js}"></script>
<!-- senhas-conferem -->
<script th:src="@{/js/senhas-conferem.js}"></script>
<!-- auto-hide -->
<script th:src="@{/js/auto-hide.js}"></script>
<!-- limpa_mensagem-ao-digitar -->
<script th:src="@{/js/limpa_mensagem-ao-digitar.js}"></script>

<!-- modal-excluir-usuario -->
<script th:src="@{/js/modal-excluir-usuario.js}"></script>

<!-- Mensagem padrão -->
<script th:src="@{/js/mensagens.js}"></script>

<!-- autoCompletaAbaCliente -->
<script th:src="@{/js/autoCompletaAbaCliente.js}"></script>

<!-- autoCompletaAbaCliente -->
<script th:src="@{/js/autoCompletaAbaItens.js}"></script>

</body>
</html>
