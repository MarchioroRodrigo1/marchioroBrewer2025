<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="mensagens">

    <!-- Mensagem de sucesso -->
    <input type="hidden"
       id="mensagemSucesso"
       th:if="${mensagemSucesso}"
       th:value="${mensagemSucesso}">

    <!-- Mensagem de erro -->
    <input type="hidden"
       id="mensagemErro"
       th:if="${mensagemErro}"
       th:value="${mensagemErro}">

</div>

</body>
</html>
