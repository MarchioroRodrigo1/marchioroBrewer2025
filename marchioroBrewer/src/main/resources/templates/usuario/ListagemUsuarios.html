
<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{layout/LayoutPadrao}">

<body>

<div th:if="${mensagemSucesso}" 
     class="alert alert-success alert-dismissible fade show">

    <span th:text="${mensagemSucesso}"></span>

    <button type="button" 
            class="btn-close" 
            data-bs-dismiss="alert"></button>
</div>

	<!-- =========================================================
     CONTEÚDO PRINCIPAL
========================================================== -->
	<section layout:fragment="conteudo">

		<div class="container-fluid mt-4">

			<!-- =================================================
             TÍTULO
        ================================================== -->
			<h1 class="mb-4">Listagem de Usuários</h1>
			

		</div>
	

		<!-- =================================================
             FORMULÁRIO DE FILTRO
        ================================================== -->
		<form method="get" th:action="@{/usuario}" class="row g-3 mb-4">
			<div class="col-md-4">
				<input type="text" name="nomeUsuario" th:value="${nomeUsuario}"
					class="form-control" placeholder="Nome do usuário">
			</div>

			<div class="col-md-2">
				<button class="btn btn-outline-primary w-100">Filtrar</button>
			</div>
		</form>

		<!-- =================================================
             TABELA DE USUÁRIOS
        ================================================== -->
		<div class="table-reponsive">
			<table class="table table-striped table-hover">
				<thead class="table-dark">
					<tr class="text-center">
						<th>Nome</th>
						<th>Email</th>
						<th>Grupos</th>
						<th>Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr class="text-center" th:each="u : ${usuarios}">
						<td th:text="${u.nomeUsuario}"></td>
						<td th:text="${u.emailUsuario}"></td>
						<td><span th:each="g, stat : ${u.grupos}"> <span
								class="badge bg-primary" th:text="${g.nomeGrupo}"></span> <span
								th:if="${!stat.last}"> </span>
						</span></td>
						<td>
							<!-- ======================================
                             EDITAR
                        ======================================= --> <a
							th:href="@{/usuario/{id}(id=${u.id})}"
							class="btn btn-sm btn-outline-primary"> <i class="fa fa-edit"></i>
								Editar
						</a> <!-- ======================================
                             SOFT DELETE
                        ======================================= --> <!-- EXCLUIR (MODAL) -->
							<button type="button" class="btn btn-sm btn-outline-danger"
								data-bs-toggle="modal" data-bs-target="#modalExcluir"
								th:attr="data-id=${u.id}, data-nome=${u.nomeUsuario}">

								<i class="fa fa-trash"></i> <span class="d-none d-md-inline">
									Excluir</span>

							</button>
						</td>
					</tr>
				</tbody>
			</table>


			<!-- =================================================
             PAGINAÇÃO
        ================================================== -->
			<nav th:if="${page != null and page.totalPages > 1}">
				<ul class="pagination">

					<li class="page-item" th:classappend="${page.first} ? 'disabled'">

						<a class="page-link"
						th:href="@{/clientes(page=${page.number - 1}, nomeCliente=${nomeCliente})}">
							Anterior </a>
					</li>

					<li class="page-item"
						th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
						th:classappend="${i == page.number} ? 'active'"><a
						class="page-link"
						th:href="@{/usuario(page=${i}, nomeUsuario=${nomeUsuario})}"
						th:text="${i + 1}"> </a></li>

					<li class="page-item" th:classappend="${page.last} ? 'disabled'">

						<a class="page-link"
						th:href="@{/usario(page=${page.number + 1}, nomeUsuario=${nomeUsuario})}">
							Próxima </a>
					</li>

				</ul>
			</nav>

		</div>

		<!-- =========================================================
         MODAL DE EXCLUSÃO
    ========================================================== -->
		<form id="formExcluir" method="post">
			<input type="hidden" th:name="${_csrf.parameterName}"
				th:value="${_csrf.token}" />
			<div class="modal fade" id="modalExcluir" tabindex="-1">
				<div class="modal-dialog modal-dialog-centered">
					<div class="modal-content">

						<div class="modal-header">
							<h5 class="modal-title">Confirmar exclusão</h5>
							<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
						</div>

						<div class="modal-body">
							Tem certeza que deseja excluir o usuario <strong id="nomeCliente"></strong>?
						</div>

						<div class="modal-footer">
							<button type="button" class="btn btn-secondary"
								data-bs-dismiss="modal">Cancelar</button>
							<button type="submit" class="btn btn-danger">Excluir</button>
						</div>

					</div>
				</div>
			</div>
		</form>

	</section>
</body>
</html>
